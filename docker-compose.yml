version: '3.8'

services:
  # Main API & WebSocket Hub
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.server
    ports:
      - "8000:8000"
    environment:
      - CPIP_HOST=0.0.0.0
      - CPIP_PORT=8000
      - CPIP_DEBUG=true
      - DATABASE_URL=sqlite+aiosqlite:///./cpip.db
    volumes:
      - ./cpip_data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  # Build Farm Worker
  builder:
    build:
      context: .
      dockerfile: deploy/Dockerfile.builder
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./cpip_builds:/tmp/cpip-builds
    depends_on:
      - redis
    restart: unless-stopped

  # Redis for queues & rate limiting
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
